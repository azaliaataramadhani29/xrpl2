<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layounting 2</title>

    <style>
        .header {
            width: 100%;
            height: 180px;
            background-color: rgb(247, 243, 10);
            color: #000000;
            padding-left: 30px;
        }
        .menu {
            width: 100%;
            height: 70px;
            background-color: rgb(172, 12, 12);
            color: #fff;
            padding-left: 30px;
        }
        .konten {
            display: flex;
            width: 100%;
            height: auto;
        }
        .sidebar {
            width: 30%;
            height: 600px;
            background-color: pink;
            color: #000;
        }
        .main {
            width: 70%;
            height: 600px;
            background-color: darkblue;
            color: #fff;
        }
        .footer {
            width: 100%;
            height: 70px;
            background-color: darkgreen;
            color: #fff;
        }
    </style>
</head>    
<body>
    

    <div class="header">Header</div>
    <div class="menu">Menu</div>
    <div class="konten">
        <div class="sidebar">SideBar</div>
        <div class="main">Main</div>
    </div>
    <div class="footer">Footer</div>

</body>
</html>
